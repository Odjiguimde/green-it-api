# ============================================================
# render.yaml — Configuration de déploiement pour Render.com
# ============================================================
# Ce fichier indique à Render comment construire et lancer
# l'application Flask en production.
# ============================================================

services:
  - type: web
    name: green-it-api
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn wsgi:app --bind 0.0.0.0:$PORT
    envVars:
      - key: MONGO_URI
        sync: false        # Valeur à saisir manuellement dans le dashboard Render
      - key: DB_NAME
        value: green_it_db
      - key: FLASK_DEBUG
        value: "False"     # Toujours False en production
